<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sonomètre — CETIM</title>
<style>
  :root{
    --navy:#001E50; --navy-deep:#00133A; --red:#EF3346;
    --lcd-bg:#EAF1FA; --lcd-ink:#0B1B3C; --lcd-dim:#41598a; --lcd-grid:#C7D5EA;
    --key:#0A2A66; --key-hi:rgba(255,255,255,.14); --line:rgba(255,255,255,.12);
    --amber:#E88A1A; --green:#2FBF83;
    --font:"Arial Nova", Arial, Helvetica, sans-serif;
    --mono:"SF Mono", ui-monospace, "Cascadia Mono", Consolas, monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
  html,body{height:100%}
  body{
    position:fixed;inset:0;overflow:hidden;             /* écran fixe : aucun scroll */
    font-family:var(--font);color:#fff;
    background:linear-gradient(180deg,#0C2760 0%,var(--navy) 30%,#001238 100%);
    display:flex;flex-direction:column;
    padding:calc(env(safe-area-inset-top) + 6px) calc(env(safe-area-inset-right) + 10px)
            calc(env(safe-area-inset-bottom) + 8px) calc(env(safe-area-inset-left) + 10px);
    max-width:560px;margin:0 auto;
  }

  /* ---------- entête ---------- */
  header{display:flex;align-items:center;justify-content:space-between;padding:2px 4px 8px;flex:0 0 auto}
  header .brand{font-size:12px;letter-spacing:.22em;font-weight:700;display:flex;align-items:center;gap:8px}
  header .brand b{color:var(--red)}
  header .model{font-size:9px;color:#7d90b5;letter-spacing:.12em}
  .led{width:7px;height:7px;border-radius:50%;background:#31446e;display:inline-block}
  .led.on{background:var(--green);box-shadow:0 0 8px rgba(47,191,131,.9)}

  /* ---------- ÉCRAN LCD FIXE ---------- */
  .lcd{
    flex:1 1 auto;min-height:0;                          /* prend tout l'espace restant, taille stable */
    background:linear-gradient(180deg,#F4F8FE 0%,var(--lcd-bg) 100%);
    border-radius:14px;color:var(--lcd-ink);
    box-shadow:inset 0 3px 10px rgba(0,30,80,.22), 0 1px 0 rgba(255,255,255,.15);
    display:flex;flex-direction:column;
    padding:10px 12px 8px;overflow:hidden;
  }
  .statusline{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--lcd-dim);flex:0 0 auto;font-family:var(--mono)}
  .badge{font-weight:700;padding:2px 7px;border-radius:4px;background:var(--navy);color:#fff;font-size:10px;font-family:var(--font);letter-spacing:.04em}
  .badge.rec{background:var(--red)}
  .badge.rec::before{content:"● ";animation:blink 1.2s step-end infinite}
  @keyframes blink{50%{opacity:.2}}

  .mainrow{display:flex;align-items:baseline;justify-content:center;gap:8px;flex:0 0 auto;margin-top:2px}
  .mainrow .num{font-family:var(--mono);font-size:clamp(44px,13vw,64px);font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .mainrow .unit{font-size:14px;font-weight:700;color:var(--lcd-dim)}
  .mainrow .lbl{font-size:12px;font-weight:700;color:var(--lcd-dim);letter-spacing:.1em}

  .bargraph{height:9px;border-radius:5px;background:#D0DCEE;margin:6px 2px 2px;overflow:hidden;position:relative;flex:0 0 auto}
  .bargraph .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--navy) 0%,var(--navy) 62%,var(--amber) 78%,var(--red) 92%)}
  .bargraph .peakmark{position:absolute;top:0;bottom:0;width:2px;background:var(--red)}
  .barscale{display:flex;justify-content:space-between;font-size:8px;color:#8fa3c4;font-family:var(--mono);padding:0 2px;flex:0 0 auto}

  /* zone graphique fixe : les 3 affichages sont superposés, un seul visible */
  .graphzone{flex:1 1 auto;min-height:0;position:relative;margin-top:6px;border-top:1px solid var(--lcd-grid);padding-top:6px}
  .gtitle{position:absolute;top:8px;left:2px;font-size:9px;letter-spacing:.14em;font-weight:700;color:var(--lcd-dim);z-index:2}
  .gpane{position:absolute;inset:22px 0 0 0;display:none}
  .gpane.on{display:block}
  canvas{position:absolute;inset:0;width:100%;height:100%}

  /* écran VALEURS */
  #paneVal{overflow:hidden}
  .valtable{display:grid;grid-template-columns:1fr 1fr;gap:6px;height:100%;align-content:start}
  .valtable .cell{background:rgba(0,30,80,.06);border-radius:8px;padding:8px;text-align:center}
  .valtable .k{font-size:10px;letter-spacing:.06em;color:var(--lcd-dim);font-weight:700}
  .valtable .v{font-family:var(--mono);font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .valtable .v.red{color:var(--red)}

  .bottomstrip{display:flex;justify-content:space-between;align-items:center;flex:0 0 auto;margin-top:6px;padding-top:5px;border-top:1px solid var(--lcd-grid);font-family:var(--mono);font-size:11px;color:var(--lcd-dim)}
  .bottomstrip b{color:var(--lcd-ink);font-weight:700}
  .progress{height:3px;background:#D0DCEE;border-radius:2px;overflow:hidden;flex:1;margin:0 10px}
  .progress .p{height:100%;width:0%;background:var(--red)}

  /* ---------- CLAVIER PHYSIQUE ---------- */
  .keypad{flex:0 0 auto;display:flex;flex-direction:column;gap:7px;padding-top:10px}
  .krow{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
  .key{
    border:0;border-radius:12px;min-height:52px;cursor:pointer;color:#fff;
    background:linear-gradient(180deg,#123573 0%,var(--key) 45%,#07204F 100%);
    box-shadow:0 3px 0 #041233, inset 0 1px 0 var(--key-hi);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-family:var(--font);
  }
  .key:active{transform:translateY(2px);box-shadow:0 1px 0 #041233, inset 0 1px 0 var(--key-hi)}
  .key .kf{font-size:8px;letter-spacing:.14em;color:#8fa3c4;font-weight:700}
  .key .kv{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
  .key .kv small{font-size:10px;color:#B9C7E2}
  .key .dot{width:6px;height:6px;border-radius:50%;background:#31446e;margin-top:1px}
  .key.lit .dot{background:var(--green);box-shadow:0 0 6px rgba(47,191,131,.9)}
  .key-start{
    grid-column:span 2;
    background:linear-gradient(180deg,#FF5A6B 0%,var(--red) 45%,#B21226 100%);
    box-shadow:0 3px 0 #700A16, inset 0 1px 0 rgba(255,255,255,.25);
  }
  .key-start:active{box-shadow:0 1px 0 #700A16, inset 0 1px 0 rgba(255,255,255,.25)}
  .key-start.running{background:linear-gradient(180deg,#5f6b85 0%,#3c4a6e 45%,#232c44 100%);box-shadow:0 3px 0 #10182b, inset 0 1px 0 rgba(255,255,255,.15)}
  .key-start .kv{font-size:16px;letter-spacing:.08em}

  #err{display:none;position:absolute;left:12px;right:12px;top:12px;z-index:9;background:#B21226;color:#fff;border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  @media (prefers-reduced-motion:reduce){.badge.rec::before{animation:none}}
</style>
</head>
<body>

  <header>
    <div class="brand"><span class="led" id="led"></span>CET<b>I</b>M SONOMÈTRE</div>
    <div class="model">SLM-3744 · MICRO INTERNE</div>
  </header>

  <div id="err"></div>

  <!-- ================= ÉCRAN LCD (taille fixe, jamais de scroll) ================= -->
  <div class="lcd">
    <div class="statusline">
      <span id="modeBadge" class="badge">PRÊT</span>
      <span id="cfgLine">A·F·1/3</span>
      <span id="tLine">00:00 / ∞</span>
    </div>

    <div class="mainrow">
      <span class="num" id="mainVal">--.-</span>
      <span class="unit">dB</span>
      <span class="lbl" id="mainLbl">LAF</span>
    </div>

    <div class="bargraph"><div class="fill" id="barFill"></div><div class="peakmark" id="peakMark" style="left:0%"></div></div>
    <div class="barscale"><span>30</span><span>50</span><span>70</span><span>90</span><span>110</span><span>130</span></div>

    <div class="graphzone">
      <div class="gtitle" id="gTitle">SPECTRE · TIERS D'OCTAVE · POND. A</div>
      <div class="gpane on" id="paneSpec"><canvas id="specCv"></canvas></div>
      <div class="gpane" id="paneHist"><canvas id="histCv"></canvas></div>
      <div class="gpane" id="paneVal">
        <div class="valtable">
          <div class="cell"><div class="k">LAeq</div><div class="v" id="vLAeq">--.-</div></div>
          <div class="cell"><div class="k">LCeq</div><div class="v" id="vLCeq">--.-</div></div>
          <div class="cell"><div class="k">LZeq</div><div class="v" id="vLZeq">--.-</div></div>
          <div class="cell"><div class="k">LAFmax</div><div class="v red" id="vMax">--.-</div></div>
          <div class="cell"><div class="k">LAFmin</div><div class="v" id="vMin">--.-</div></div>
          <div class="cell"><div class="k">OFFSET CAL. / COMP</div><div class="v" id="vCal" style="font-size:16px">90.0 dB · off</div></div>
        </div>
      </div>
    </div>

    <div class="bottomstrip">
      <span>LAeq <b id="sLAeq">--.-</b></span>
      <div class="progress"><div class="p" id="tProg"></div></div>
      <span>LCeq <b id="sLCeq">--.-</b></span>
    </div>
  </div>

  <!-- ================= CLAVIER ================= -->
  <div class="keypad">
    <div class="krow">
      <button class="key" id="kScreen"><span class="kf">ÉCRAN</span><span class="kv" id="kScreenV">Spectre</span></button>
      <button class="key" id="kW"><span class="kf">POND.</span><span class="kv" id="kWV">A</span></button>
      <button class="key" id="kT"><span class="kf">TEMPS</span><span class="kv" id="kTV">Fast</span></button>
      <button class="key" id="kMode"><span class="kf">ANALYSE</span><span class="kv" id="kModeV">1/3 oct</span></button>
    </div>
    <div class="krow">
      <button class="key" id="kDur"><span class="kf">DURÉE</span><span class="kv" id="kDurV">∞</span></button>
      <button class="key" id="kCalM"><span class="kf">CAL</span><span class="kv">−0.5</span></button>
      <button class="key" id="kCalP"><span class="kf">CAL</span><span class="kv">+0.5</span></button>
      <button class="key" id="kComp"><span class="kf">COMP iPHONE</span><span class="dot"></span></button>
    </div>
    <div class="krow">
      <button class="key" id="kReset"><span class="kf">MESURE</span><span class="kv">Réinit</span></button>
      <button class="key" id="kCsv"><span class="kf">EXPORT</span><span class="kv">CSV</span></button>
      <button class="key key-start" id="kStart"><span class="kv">▶ DÉMARRER</span></button>
    </div>
  </div>

<script>
"use strict";
/* ================= État ================= */
const S = {
  running:false, paused:false, screen:'spec',           // spec | hist | val
  weight:'A', time:'F', mode:'toct', duration:0, offset:90.0, comp:false,
  ctx:null, analyser:null, stream:null, raf:0, wake:null,
  fftDb:null, freqs:null, binHz:0,
  wA:null, wC:null, compGain:null,
  bands:[], bandBins:[],
  bandPowF:null, bandPowS:null, bandPeak:null, bandEnergy:null,
  pF:{A:0,C:0,Z:0}, pS:{A:0,C:0,Z:0},
  eq:{A:0,C:0,Z:0}, eqT:0,
  lafMax:-Infinity, lafMin:Infinity,
  elapsed:0, lastT:0, hist:[], histLast:0, peakHold:0
};
const NOMS=[20,25,31.5,40,50,63,80,100,125,160,200,250,315,400,500,630,800,1000,1250,1600,2000,2500,3150,4000,5000,6300,8000,10000,12500,16000];
const DURS=[0,30,60,300,900], DURL=['∞','30 s','1 min','5 min','15 min'];
const $=id=>document.getElementById(id);

/* ============ Pondérations IEC 61672 ============ */
function aWeight(f){ if(f<=0)return -200;
  const f2=f*f, r=(12194**2*f2*f2)/((f2+20.6**2)*Math.sqrt((f2+107.7**2)*(f2+737.9**2))*(f2+12194**2));
  return 20*Math.log10(r)+2.00; }
function cWeight(f){ if(f<=0)return -200;
  const f2=f*f, r=(12194**2*f2)/((f2+20.6**2)*(f2+12194**2));
  return 20*Math.log10(r)+0.06; }

/* Compensation micro iPhone (correction à AJOUTER, dB) — approximative */
const COMP_F=[20,25,31.5,40,50,63,80,100,125,160,200,1000,5000,6300,8000,10000,12500,16000];
const COMP_G=[12,10, 8,  6, 4.5,3,  2, 1.2,0.7,0.3,0,  0,   0,  -0.5,-1.5,-2.5,-3,-2];
function compAt(f){
  if(f<=COMP_F[0])return COMP_G[0];
  if(f>=COMP_F[COMP_F.length-1])return COMP_G[COMP_G.length-1];
  for(let i=1;i<COMP_F.length;i++) if(f<COMP_F[i]){
    const a=Math.log(f/COMP_F[i-1])/Math.log(COMP_F[i]/COMP_F[i-1]);
    return COMP_G[i-1]+a*(COMP_G[i]-COMP_G[i-1]); }
  return 0;
}

/* ================= Audio ================= */
async function initAudio(){
  S.ctx=new (window.AudioContext||window.webkitAudioContext)();
  S.stream=await navigator.mediaDevices.getUserMedia({audio:{
    echoCancellation:false, noiseSuppression:false, autoGainControl:false, channelCount:1
  }});
  const src=S.ctx.createMediaStreamSource(S.stream);
  const an=S.ctx.createAnalyser();
  an.fftSize=16384; an.smoothingTimeConstant=0;
  src.connect(an); S.analyser=an;
  const n=an.frequencyBinCount;
  S.fftDb=new Float32Array(n);
  S.binHz=S.ctx.sampleRate/an.fftSize;
  S.freqs=new Float32Array(n); S.wA=new Float32Array(n); S.wC=new Float32Array(n); S.compGain=new Float32Array(n);
  for(let i=0;i<n;i++){
    const f=i*S.binHz; S.freqs[i]=f;
    S.wA[i]=Math.pow(10,aWeight(f)/10);
    S.wC[i]=Math.pow(10,cWeight(f)/10);
    S.compGain[i]=Math.pow(10,compAt(f)/10);
  }
  S.bands=[]; S.bandBins=[];
  for(const fc of NOMS){
    if(fc*Math.pow(2,1/6) > S.ctx.sampleRate/2) break;
    const lo=fc*Math.pow(2,-1/6), hi=fc*Math.pow(2,1/6);
    const i0=Math.max(1,Math.ceil(lo/S.binHz)), i1=Math.min(n-1,Math.floor(hi/S.binHz));
    if(i1>=i0){ S.bands.push(fc); S.bandBins.push([i0,i1]); }
  }
  S.bandPowF=new Float32Array(S.bands.length);
  S.bandPowS=new Float32Array(S.bands.length);
  S.bandEnergy=new Float64Array(S.bands.length);
  S.bandPeak=new Float32Array(S.bands.length).fill(-99);
}

function resetMeasure(){
  S.pF={A:0,C:0,Z:0}; S.pS={A:0,C:0,Z:0};
  S.eq={A:0,C:0,Z:0}; S.eqT=0;
  S.lafMax=-Infinity; S.lafMin=Infinity;
  S.elapsed=0; S.hist=[]; S.histLast=0; S.peakHold=0;
  if(S.bandEnergy)S.bandEnergy.fill(0);
  if(S.bandPowF)S.bandPowF.fill(0);
  if(S.bandPowS)S.bandPowS.fill(0);
  if(S.bandPeak)S.bandPeak.fill(-99);
  updateNumbers(-99); drawActive();
}

/* ================= Boucle ================= */
const lvl=p=>p>0?10*Math.log10(p)+S.offset:-99;
function loop(ts){
  S.raf=requestAnimationFrame(loop);
  if(!S.lastT){S.lastT=ts;return;}
  const dt=Math.min(0.2,(ts-S.lastT)/1000); S.lastT=ts;
  if(S.paused)return;
  S.elapsed+=dt;

  S.analyser.getFloatFrequencyData(S.fftDb);
  const n=S.fftDb.length;
  let pA=0,pC=0,pZ=0;
  const nb=S.bands.length, bp=new Float32Array(nb);
  const wSel=S.weight==='A'?S.wA:S.weight==='C'?S.wC:null;

  for(let i=1;i<n;i++){
    let p=Math.pow(10,S.fftDb[i]/10);
    if(!isFinite(p))p=0;
    if(S.comp)p*=S.compGain[i];
    pZ+=p; pA+=p*S.wA[i]; pC+=p*S.wC[i];
  }
  for(let b=0;b<nb;b++){
    const [i0,i1]=S.bandBins[b]; let s=0;
    for(let i=i0;i<=i1;i++){
      let p=Math.pow(10,S.fftDb[i]/10);
      if(!isFinite(p))p=0;
      if(S.comp)p*=S.compGain[i];
      if(wSel)p*=wSel[i];
      s+=p;
    }
    bp[b]=s;
  }

  const aF=Math.exp(-dt/0.125), aS=Math.exp(-dt/1.0);
  for(const k of ['A','C','Z']){
    const p=k==='A'?pA:k==='C'?pC:pZ;
    S.pF[k]=aF*S.pF[k]+(1-aF)*p;
    S.pS[k]=aS*S.pS[k]+(1-aS)*p;
    S.eq[k]+=p*dt;
  }
  S.eqT+=dt;
  for(let b=0;b<nb;b++){
    S.bandPowF[b]=aF*S.bandPowF[b]+(1-aF)*bp[b];
    S.bandPowS[b]=aS*S.bandPowS[b]+(1-aS)*bp[b];
    S.bandEnergy[b]+=bp[b]*dt;
    const Lb=lvl(S.time==='F'?S.bandPowF[b]:S.bandPowS[b]);
    if(Lb>S.bandPeak[b])S.bandPeak[b]=Lb; else S.bandPeak[b]-=dt*3;
  }

  const L=lvl(S.time==='F'?S.pF[S.weight]:S.pS[S.weight]);
  const LAF=lvl(S.time==='F'?S.pF.A:S.pS.A);
  if(S.eqT>0.5){ if(LAF>S.lafMax)S.lafMax=LAF; if(LAF<S.lafMin)S.lafMin=LAF; }
  if(L>S.peakHold)S.peakHold=L; else S.peakHold-=dt*2;

  if(S.elapsed-S.histLast>=0.1){
    S.histLast=S.elapsed;
    S.hist.push({t:S.elapsed, L:L, Leq:lvl(S.eq[S.weight]/S.eqT)});
    const maxPts=(S.duration>0?S.duration:900)/0.1+10;
    if(S.hist.length>maxPts)S.hist.splice(0,S.hist.length-maxPts);
  }
  if(S.duration>0 && S.elapsed>=S.duration){stopMeasure(true);}

  updateNumbers(L);
  drawActive();
}

/* ================= Chiffres ================= */
function fmt(v){return (v<=-90||!isFinite(v))?'--.-':v.toFixed(1);}
function updateNumbers(L){
  $('mainVal').textContent=fmt(L);
  const laeq=S.eqT>0?lvl(S.eq.A/S.eqT):-99, lceq=S.eqT>0?lvl(S.eq.C/S.eqT):-99;
  $('sLAeq').textContent=fmt(laeq); $('sLCeq').textContent=fmt(lceq);
  $('vLAeq').textContent=fmt(laeq); $('vLCeq').textContent=fmt(lceq);
  $('vLZeq').textContent=fmt(S.eqT>0?lvl(S.eq.Z/S.eqT):-99);
  $('vMax').textContent=fmt(S.lafMax); $('vMin').textContent=fmt(S.lafMin);
  $('barFill').style.width=Math.max(0,Math.min(100,(L-30)))+'%';
  $('peakMark').style.left=Math.max(0,Math.min(100,(S.peakHold-30)))+'%';
  const m=Math.floor(S.elapsed/60),s=Math.floor(S.elapsed%60);
  $('tLine').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+' / '+DURL[DURS.indexOf(S.duration)];
  if(S.duration>0)$('tProg').style.width=Math.min(100,S.elapsed/S.duration*100)+'%';
  else $('tProg').style.width='0%';
}

/* ================= Canvas : dimensionnés UNE fois ================= */
const CV={};
function sizeCanvas(id){
  const cv=$(id), r=cv.parentElement.getBoundingClientRect();
  if(r.width<10||r.height<10)return;
  const dpr=Math.min(2,window.devicePixelRatio||1);
  cv.width=Math.round(r.width*dpr); cv.height=Math.round(r.height*dpr);
  const g=cv.getContext('2d'); g.setTransform(dpr,0,0,dpr,0,0);
  CV[id]={g,w:r.width,h:r.height};
}
function sizeAll(){sizeCanvas('specCv');sizeCanvas('histCv');drawActive(true);}
window.addEventListener('resize',()=>setTimeout(sizeAll,60));
window.addEventListener('orientationchange',()=>setTimeout(sizeAll,250));

const DBMIN=20, DBMAX=110;
const y2=(L,h)=>(1-Math.max(0,Math.min(1,(L-DBMIN)/(DBMAX-DBMIN))))*(h-16)+2;

function drawSpectrum(){
  const c=CV.specCv; if(!c)return;
  const {g,w,h}=c;
  g.fillStyle='#F4F8FE';g.fillRect(0,0,w,h);
  const padL=24;
  g.strokeStyle='#DCE6F4';g.fillStyle='#8fa3c4';g.font='8px Arial';g.textAlign='right';g.lineWidth=1;
  for(let d=DBMIN;d<=DBMAX;d+=10){const y=y2(d,h);g.beginPath();g.moveTo(padL,y);g.lineTo(w-2,y);g.stroke();g.fillText(d,padL-3,y+3);}
  if(!S.bands.length)return;

  if(S.mode==='toct'){
    const nb=S.bands.length, bw=(w-padL-4)/nb;
    const pw=S.time==='F'?S.bandPowF:S.bandPowS;
    g.textAlign='center';
    for(let b=0;b<nb;b++){
      const L=lvl(pw[b]), x=padL+b*bw, y=y2(L,h), y0=y2(DBMIN,h);
      g.fillStyle=L>85?'#EF3346':L>70?'#E88A1A':'#1C4FA0';
      g.fillRect(x+1,y,Math.max(1,bw-2),Math.max(0,y0-y));
      const Lp=S.bandPeak[b];
      if(Lp>DBMIN){g.fillStyle='#0B1B3C';g.fillRect(x+1,y2(Lp,h)-1,Math.max(1,bw-2),2);}
      if([31.5,125,500,2000,8000].includes(S.bands[b])){
        g.fillStyle='#8fa3c4';
        g.fillText(S.bands[b]>=1000?(S.bands[b]/1000)+'k':S.bands[b],x+bw/2,h-4);
      }
    }
  }else{
    const fmin=20,fmax=Math.min(20000,S.ctx?S.ctx.sampleRate/2:20000);
    const x2=f=>padL+(Math.log(f/fmin)/Math.log(fmax/fmin))*(w-padL-4);
    g.strokeStyle='#DCE6F4';g.fillStyle='#8fa3c4';g.font='8px Arial';g.textAlign='center';
    for(const f of [63,250,1000,4000,16000]){
      const x=x2(f);g.beginPath();g.moveTo(x,2);g.lineTo(x,h-14);g.stroke();
      g.fillText(f>=1000?(f/1000)+'k':f,x,h-4);
    }
    const wSel=S.weight==='A'?S.wA:S.weight==='C'?S.wC:null;
    g.beginPath();g.strokeStyle='#1C4FA0';g.lineWidth=1.3;
    let st=false;
    for(let i=1;i<S.fftDb.length;i++){
      const f=S.freqs[i]; if(f<fmin)continue; if(f>fmax)break;
      let p=Math.pow(10,S.fftDb[i]/10); if(!isFinite(p))p=0;
      if(S.comp)p*=S.compGain[i];
      if(wSel)p*=wSel[i];
      const x=x2(f), y=y2(lvl(p),h);
      if(!st){g.moveTo(x,y);st=true;}else g.lineTo(x,y);
    }
    g.stroke();
  }
}

function drawHistory(){
  const c=CV.histCv; if(!c)return;
  const {g,w,h}=c;
  g.fillStyle='#F4F8FE';g.fillRect(0,0,w,h);
  const padL=24;
  g.strokeStyle='#DCE6F4';g.fillStyle='#8fa3c4';g.font='8px Arial';g.textAlign='right';g.lineWidth=1;
  for(let d=DBMIN;d<=DBMAX;d+=20){const y=y2(d,h);g.beginPath();g.moveTo(padL,y);g.lineTo(w-2,y);g.stroke();g.fillText(d,padL-3,y+3);}
  if(S.hist.length<2)return;
  const span=S.duration>0?S.duration:Math.max(30,S.elapsed);
  const t1=S.hist[S.hist.length-1].t, t0=Math.max(0,t1-span);
  const x2=t=>padL+((t-t0)/Math.max(1e-6,span))*(w-padL-4);
  g.beginPath();g.strokeStyle='#1C4FA0';g.lineWidth=1.1;let st=false;
  for(const pt of S.hist){if(pt.t<t0)continue;const x=x2(pt.t),y=y2(pt.L,h);if(!st){g.moveTo(x,y);st=true;}else g.lineTo(x,y);}
  g.stroke();
  g.beginPath();g.strokeStyle='#EF3346';g.lineWidth=2;st=false;
  for(const pt of S.hist){if(pt.t<t0)continue;const x=x2(pt.t),y=y2(pt.Leq,h);if(!st){g.moveTo(x,y);st=true;}else g.lineTo(x,y);}
  g.stroke();
  g.textAlign='left';g.font='9px Arial';
  g.fillStyle='#1C4FA0';g.fillText('L'+S.weight+S.time,padL+4,10);
  g.fillStyle='#EF3346';g.fillText('L'+S.weight+'eq',padL+40,10);
}

function drawActive(force){
  if(S.screen==='spec')drawSpectrum();
  else if(S.screen==='hist')drawHistory();
}

/* ================= UI ================= */
function ui(){
  $('mainLbl').textContent='L'+S.weight+S.time;
  $('cfgLine').textContent=S.weight+'·'+S.time+'·'+(S.mode==='toct'?'1/3':'FFT')+(S.comp?'·comp':'');
  $('gTitle').textContent=S.screen==='spec'
    ? 'SPECTRE · '+(S.mode==='toct'?"TIERS D'OCTAVE":'BANDES FINES')+' · POND. '+S.weight
    : S.screen==='hist' ? 'ÉVOLUTION · L'+S.weight+S.time+' + L'+S.weight+'eq' : 'VALEURS DE LA MESURE';
  $('kScreenV').textContent=S.screen==='spec'?'Spectre':S.screen==='hist'?'Évolution':'Valeurs';
  $('kWV').textContent=S.weight;
  $('kTV').textContent=S.time==='F'?'Fast':'Slow';
  $('kModeV').textContent=S.mode==='toct'?'1/3 oct':'FFT';
  $('kDurV').textContent=DURL[DURS.indexOf(S.duration)];
  $('kComp').classList.toggle('lit',S.comp);
  $('vCal').textContent=S.offset.toFixed(1)+' dB · '+(S.comp?'on':'off');
  $('led').classList.toggle('on',S.running&&!S.paused);
  const badge=$('modeBadge');
  if(S.running&&!S.paused){badge.textContent='MESURE';badge.className='badge rec';}
  else if(S.paused){badge.textContent='PAUSE';badge.className='badge';}
  ['paneSpec','paneHist','paneVal'].forEach(id=>$(id).classList.remove('on'));
  $(S.screen==='spec'?'paneSpec':S.screen==='hist'?'paneHist':'paneVal').classList.add('on');
}

/* ================= Touches ================= */
$('kScreen').onclick=()=>{S.screen=S.screen==='spec'?'hist':S.screen==='hist'?'val':'spec';ui();requestAnimationFrame(()=>{sizeAll();});};
$('kW').onclick=()=>{S.weight=S.weight==='A'?'C':S.weight==='C'?'Z':'A';ui();drawActive();};
$('kT').onclick=()=>{S.time=S.time==='F'?'S':'F';ui();drawActive();};
$('kMode').onclick=()=>{S.mode=S.mode==='toct'?'fft':'toct';ui();drawActive();};
$('kDur').onclick=()=>{S.duration=DURS[(DURS.indexOf(S.duration)+1)%DURS.length];ui();updateNumbers(-99);};
$('kCalM').onclick=()=>{S.offset=Math.round((S.offset-0.5)*2)/2;ui();};
$('kCalP').onclick=()=>{S.offset=Math.round((S.offset+0.5)*2)/2;ui();};
$('kComp').onclick=()=>{S.comp=!S.comp;ui();};
$('kReset').onclick=()=>{if(S.running)stopMeasure(false);resetMeasure();$('modeBadge').textContent='PRÊT';$('modeBadge').className='badge';};

/* Pause : appui long sur DÉMARRER ? Non — simple : DÉMARRER alterne marche/arrêt, RÉINIT remet à zéro */
$('kStart').onclick=async function(){
  if(S.running){stopMeasure(false);return;}
  try{
    if(!S.ctx)await initAudio();
    if(S.ctx.state==='suspended')await S.ctx.resume();
  }catch(e){
    const el=$('err');el.style.display='block';
    el.textContent="Micro refusé ou indisponible. Autorise le micro (Réglages ▸ Safari ▸ Micro) et ouvre la page en HTTPS. ("+e.message+")";
    setTimeout(()=>el.style.display='none',6000);
    return;
  }
  resetMeasure();
  S.running=true;S.paused=false;S.lastT=0;
  this.classList.add('running');this.querySelector('.kv').textContent='■ ARRÊTER';
  try{S.wake=await navigator.wakeLock?.request('screen');}catch(e){}
  cancelAnimationFrame(S.raf);S.raf=requestAnimationFrame(loop);
  ui();
};
function stopMeasure(auto){
  S.running=false;S.paused=false;
  cancelAnimationFrame(S.raf);
  const k=$('kStart');k.classList.remove('running');k.querySelector('.kv').textContent='▶ DÉMARRER';
  try{S.wake?.release();S.wake=null;}catch(e){}
  const badge=$('modeBadge');
  badge.textContent=auto?'FINI · Leq figé':'ARRÊTÉ';badge.className='badge';
  $('led').classList.remove('on');
}

/* ================= Export CSV ================= */
$('kCsv').onclick=()=>{
  let csv='SONOMETRE CETIM - export\n';
  csv+='Ponderation;'+S.weight+';Temps;'+(S.time==='F'?'Fast':'Slow')+';Offset dB;'+S.offset+';Comp iPhone;'+(S.comp?'oui':'non')+'\n';
  csv+='LAeq;'+fmt(S.eqT>0?lvl(S.eq.A/S.eqT):-99)+';LCeq;'+fmt(S.eqT>0?lvl(S.eq.C/S.eqT):-99)+';LZeq;'+fmt(S.eqT>0?lvl(S.eq.Z/S.eqT):-99)+';LAFmax;'+fmt(S.lafMax)+';LAFmin;'+fmt(S.lafMin)+'\n\n';
  csv+='SPECTRE Leq (ponderation '+S.weight+')\nfc [Hz];Leq [dB]\n';
  for(let b=0;b<S.bands.length;b++)csv+=S.bands[b]+';'+fmt(S.eqT>0?lvl(S.bandEnergy[b]/S.eqT):-99)+'\n';
  csv+='\nHISTORIQUE (10 Hz)\nt [s];L'+S.weight+S.time+' [dB];L'+S.weight+'eq [dB]\n';
  for(const pt of S.hist)csv+=pt.t.toFixed(1)+';'+pt.L.toFixed(1)+';'+pt.Leq.toFixed(1)+'\n';
  const blob=new Blob(["\ufeff"+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='sonometre_'+new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')+'.csv';
  a.click();
};

/* init */
ui();
requestAnimationFrame(()=>sizeAll());
</script>
