<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>CETIM · Waterfall 3D (prototype)</title>
<style>
  :root{--navy:#001E50;--red:#EF3346;--ink:#dfe9ff;--font:-apple-system,'Arial Nova',Arial,sans-serif}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:#00030a;color:var(--ink);font-family:var(--font);overflow:hidden}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
  #ui{position:fixed;left:0;right:0;top:0;padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;
      display:flex;flex-wrap:wrap;gap:8px;align-items:center;
      background:linear-gradient(#00030acc,#00030a00);z-index:3}
  .brand{font-weight:700;letter-spacing:.14em;font-size:13px}
  .brand b{color:var(--red)}
  .spacer{flex:1}
  .btn{background:rgba(127,196,255,.10);border:1px solid rgba(127,196,255,.35);color:var(--ink);
       font-family:var(--font);font-size:13px;font-weight:600;border-radius:9px;padding:8px 12px}
  .btn.on{background:var(--red);border-color:var(--red);color:#fff}
  .btn.rec{background:var(--red);border-color:var(--red);color:#fff}
  #status{position:fixed;left:12px;bottom:calc(env(safe-area-inset-bottom) + 10px);z-index:3;
          font-size:11px;letter-spacing:.04em;color:#7fb0e6;line-height:1.5;white-space:pre}
  #hint{position:fixed;right:12px;bottom:calc(env(safe-area-inset-bottom) + 10px);z-index:3;
        font-size:11px;color:#4d6a92;text-align:right}
  #err{position:fixed;left:12px;right:12px;top:50%;transform:translateY(-50%);z-index:5;
       background:rgba(239,51,70,.12);border:1px solid rgba(239,51,70,.5);color:#ffb0b8;
       padding:14px 16px;border-radius:12px;font-size:13px;line-height:1.4;display:none}
  .seg{display:inline-flex;border:1px solid rgba(127,196,255,.35);border-radius:9px;overflow:hidden}
  .seg .btn{border:0;border-radius:0;padding:8px 11px}
  .seg .btn+.btn{border-left:1px solid rgba(127,196,255,.25)}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="ui">
  <span class="brand">CETIM<b>|</b>WATERFALL</span>
  <span class="seg" id="durSeg">
    <button class="btn" data-sec="3">3 s</button>
    <button class="btn on" data-sec="5">5 s</button>
    <button class="btn" data-sec="10">10 s</button>
  </span>
  <button class="btn on" id="awBtn">Pond. A</button>
  <span class="spacer"></span>
  <button class="btn rec" id="startBtn">Démarrer</button>
</div>
<div id="status"></div>
<div id="hint">glisser : pivoter · pincer : zoom</div>
<div id="err"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';
const errBox=document.getElementById('err');
function fail(m){ errBox.style.display='block'; errBox.textContent=m; }
if(!window.THREE){ fail("Three.js n'a pas pu être chargé (connexion requise au premier lancement)."); return; }

/* ===================== PARAMÈTRES ===================== */
const N=150, FFT=4096, FRAME_HZ=20;
const FMIN=40; let FMAX=20000;
const DBMIN=-95, DBMAX=-25;
const EMA_A=0.45;
let aweight=true;
/* scène (centrée sur l'origine) */
const WIDTH=10, HEIGHT=3.2, DEPTH=12, YBASE=-HEIGHT*0.45;
const BG=new THREE.Color(0x00030a);

let durSec=5, maxFrames=Math.round(durSec*FRAME_HZ), spacing=DEPTH/maxFrames;

/* ===================== THREE ===================== */
const canvas=document.getElementById('gl');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
renderer.setClearColor(BG,1);
const scene=new THREE.Scene();
let viewSize=9, zoom=1;
const camera=new THREE.OrthographicCamera(-1,1,1,-1,1,200);
camera.position.set(0,0,60); camera.lookAt(0,0,0);

const pivot=new THREE.Group();        // rotation utilisateur (tilt + azimut vertical)
scene.add(pivot);
const scroller=new THREE.Group();     // glissement continu (profondeur)
pivot.add(scroller);
let rot={x:0.62,y:-0.34};             // vue par défaut : centrée, léger isométrique
function applyRot(){ pivot.rotation.x=rot.x; pivot.rotation.y=rot.y; }

/* ===================== axes de repère ===================== */
function addGrid(){
  const pts=[]; const decs=[100,1000,10000];
  for(const f of decs){ if(f<FMIN||f>FMAX)continue; const x=freqToX(f); pts.push(x,YBASE,DEPTH/2, x,YBASE,-DEPTH/2); }
  pts.push(-WIDTH/2,YBASE,DEPTH/2, WIDTH/2,YBASE,DEPTH/2);
  pts.push(-WIDTH/2,YBASE,-DEPTH/2, WIDTH/2,YBASE,-DEPTH/2);
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  pivot.add(new THREE.LineSegments(g,new THREE.LineBasicMaterial({color:0x14375f,transparent:true,opacity:0.55})));
}

/* ===================== géométrie : rideaux (masquage) + fils (couleur) ===================== */
let curtGeom,curtMesh,lineGeom,lineSeg, cPos,cCol,lPos,lCol;
function allocBuffers(){
  if(curtMesh){ scroller.remove(curtMesh); curtGeom.dispose(); curtMesh.material.dispose(); }
  if(lineSeg){ scroller.remove(lineSeg); lineGeom.dispose(); lineSeg.material.dispose(); }
  const seg=N-1;
  cPos=new Float32Array(maxFrames*seg*6*3); cCol=new Float32Array(maxFrames*seg*6*3);
  lPos=new Float32Array(maxFrames*seg*2*3); lCol=new Float32Array(maxFrames*seg*2*3);
  curtGeom=new THREE.BufferGeometry();
  curtGeom.setAttribute('position',new THREE.BufferAttribute(cPos,3));
  curtGeom.setAttribute('color',new THREE.BufferAttribute(cCol,3));
  curtGeom.setDrawRange(0,0);
  curtMesh=new THREE.Mesh(curtGeom,new THREE.MeshBasicMaterial({vertexColors:true,
     polygonOffset:true,polygonOffsetFactor:1,polygonOffsetUnits:1,side:THREE.DoubleSide}));
  curtMesh.frustumCulled=false; curtMesh.renderOrder=0; scroller.add(curtMesh);
  lineGeom=new THREE.BufferGeometry();
  lineGeom.setAttribute('position',new THREE.BufferAttribute(lPos,3));
  lineGeom.setAttribute('color',new THREE.BufferAttribute(lCol,3));
  lineGeom.setDrawRange(0,0);
  lineSeg=new THREE.LineSegments(lineGeom,new THREE.LineBasicMaterial({vertexColors:true}));
  lineSeg.frustumCulled=false; lineSeg.renderOrder=1; scroller.add(lineSeg);
}

function freqToX(f){ const t=(Math.log(f)-Math.log(FMIN))/(Math.log(FMAX)-Math.log(FMIN)); return (t-0.5)*WIDTH; }
let XS=new Float32Array(N), AW=new Float32Array(N);
function aWeight(f){ const f2=f*f;
  const ra=(12194*12194*f2*f2)/((f2+20.6*20.6)*Math.sqrt((f2+107.7*107.7)*(f2+737.9*737.9))*(f2+12194*12194));
  return 20*Math.log10(ra)+2.0; }
function buildXS(){ for(let n=0;n<N;n++){ const f=FMIN*Math.pow(FMAX/FMIN,n/(N-1)); XS[n]=freqToX(f); AW[n]=aWeight(f); } }

const STOPS=[[0.05,0.10,0.55],[0.0,0.55,1.0],[0.0,0.90,0.45],[1.0,0.95,0.15],[0.95,0.20,0.15]];
function jet(t,o){ t=t<0?0:t>1?1:t; const x=t*(STOPS.length-1),i=Math.floor(x),f=x-i;
  const a=STOPS[Math.min(i,STOPS.length-1)],b=STOPS[Math.min(i+1,STOPS.length-1)];
  o[0]=a[0]+(b[0]-a[0])*f; o[1]=a[1]+(b[1]-a[1])*f; o[2]=a[2]+(b[2]-a[2])*f; }

/* ===================== buffer circulaire ===================== */
let frames=[], ema=null; const _c=[0,0,0];
function rebuild(){
  const len=frames.length, seg=N-1; let ci=0, li=0;
  for(let k=0;k<len;k++){
    const lv=frames[k], age=(len-1-k), z=DEPTH/2-age*spacing;
    const fade=Math.pow(1-age/maxFrames,0.75);       // ancienneté → fondu vers le fond (luminosité)
    for(let n=0;n<seg;n++){
      const x0=XS[n],x1=XS[n+1], y0=YBASE+lv[n]*HEIGHT, y1=YBASE+lv[n+1]*HEIGHT;
      /* rideau opaque (couleur fond) : cache les fils derrière */
      const tri=[[x0,YBASE,z],[x0,y0,z],[x1,y1,z],[x0,YBASE,z],[x1,y1,z],[x1,YBASE,z]];
      for(let v=0;v<6;v++){ cPos[ci*3]=tri[v][0];cPos[ci*3+1]=tri[v][1];cPos[ci*3+2]=tri[v][2];
        cCol[ci*3]=BG.r;cCol[ci*3+1]=BG.g;cCol[ci*3+2]=BG.b; ci++; }
      /* fil coloré par niveau, assombri avec l'âge */
      jet(lv[n],_c);   lPos[li*3]=x0;lPos[li*3+1]=y0;lPos[li*3+2]=z; lCol[li*3]=_c[0]*fade;lCol[li*3+1]=_c[1]*fade;lCol[li*3+2]=_c[2]*fade; li++;
      jet(lv[n+1],_c); lPos[li*3]=x1;lPos[li*3+1]=y1;lPos[li*3+2]=z; lCol[li*3]=_c[0]*fade;lCol[li*3+1]=_c[1]*fade;lCol[li*3+2]=_c[2]*fade; li++;
    }
  }
  curtGeom.setDrawRange(0,ci); lineGeom.setDrawRange(0,li);
  curtGeom.attributes.position.needsUpdate=curtGeom.attributes.color.needsUpdate=true;
  lineGeom.attributes.position.needsUpdate=lineGeom.attributes.color.needsUpdate=true;
}

/* ===================== audio ===================== */
let ctx,analyser,srcNode,stream,freqDb,running=false;
async function startAudio(){
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
  srcNode=ctx.createMediaStreamSource(stream);
  analyser=ctx.createAnalyser(); analyser.fftSize=FFT; analyser.smoothingTimeConstant=0;
  srcNode.connect(analyser); freqDb=new Float32Array(analyser.frequencyBinCount);
  FMAX=Math.min(20000,ctx.sampleRate/2); buildXS(); addGrid();
  if(ctx.state==='suspended') await ctx.resume();
}
function capture(){
  analyser.getFloatFrequencyData(freqDb);
  const nb=freqDb.length, binHz=ctx.sampleRate/FFT, raw=new Float32Array(N);
  for(let n=0;n<N;n++){
    const fLo=FMIN*Math.pow(FMAX/FMIN,Math.max(0,n-0.5)/(N-1)), fHi=FMIN*Math.pow(FMAX/FMIN,Math.min(N-1,n+0.5)/(N-1));
    let b0=Math.max(0,Math.floor(fLo/binHz)), b1=Math.min(nb-1,Math.ceil(fHi/binHz)); if(b1<b0)b1=b0;
    let mx=-Infinity; for(let b=b0;b<=b1;b++){ const d=freqDb[b]; if(d>mx)mx=d; }
    if(aweight) mx+=AW[n];
    let norm=(mx-DBMIN)/(DBMAX-DBMIN); raw[n]=norm<0?0:norm>1?1:norm;
  }
  if(!ema)ema=raw.slice(); else for(let n=0;n<N;n++) ema[n]+=EMA_A*(raw[n]-ema[n]);
  const sm=new Float32Array(N); sm[0]=ema[0]; sm[N-1]=ema[N-1];
  for(let n=1;n<N-1;n++) sm[n]=(ema[n]>=ema[n-1]&&ema[n]>=ema[n+1])?ema[n]:(ema[n-1]+2*ema[n]+ema[n+1])*0.25;
  frames.push(sm); while(frames.length>maxFrames) frames.shift(); rebuild();
}

/* ===================== rendu 60 FPS ===================== */
let acc=0,last=0,fps=0,fpsT=0,fpsN=0; const frameInt=1000/FRAME_HZ;
function loop(t){
  requestAnimationFrame(loop);
  if(!last)last=t; const dt=t-last; last=t;
  if(running){ acc+=dt; if(acc>=frameInt){ capture(); acc-=frameInt; if(acc>frameInt)acc=frameInt; }
    scroller.position.z=-(acc/frameInt)*spacing; }        // glissement continu
  renderer.render(scene,camera);
  fpsN++; fpsT+=dt; if(fpsT>=500){ fps=Math.round(1000*fpsN/fpsT); fpsN=0; fpsT=0; updateStatus(); }
}

/* ===================== caméra / resize ===================== */
function updateCam(){ const w=innerWidth,h=innerHeight,a=w/h,vs=viewSize/zoom;
  camera.left=-vs*a/2; camera.right=vs*a/2; camera.top=vs/2; camera.bottom=-vs/2; camera.updateProjectionMatrix(); }
function resize(){ renderer.setSize(innerWidth,innerHeight,false); updateCam(); }
window.addEventListener('resize',resize);

/* ===================== interactions : rotation + pincer ===================== */
const ptrs=new Map(); let drag=null,pinch=null;
canvas.addEventListener('pointerdown',e=>{ ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===1) drag={x:e.clientX,y:e.clientY,rx:rot.x,ry:rot.y};
  else if(ptrs.size===2){ drag=null; const p=[...ptrs.values()]; pinch={d:Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y),z:zoom}; } });
canvas.addEventListener('pointermove',e=>{ if(!ptrs.has(e.pointerId))return; ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pinch&&ptrs.size>=2){ const p=[...ptrs.values()]; const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
      zoom=Math.max(0.4,Math.min(3,pinch.z*d/pinch.d)); updateCam(); }
  else if(drag){ rot.y=drag.ry+(e.clientX-drag.x)*0.006; rot.x=Math.max(-0.1,Math.min(1.2,drag.rx+(e.clientY-drag.y)*0.005)); applyRot(); } });
function up(e){ ptrs.delete(e.pointerId); if(ptrs.size<2)pinch=null; if(ptrs.size===0)drag=null; }
window.addEventListener('pointerup',up); window.addEventListener('pointercancel',up);

/* ===================== UI ===================== */
function updateStatus(){ document.getElementById('status').textContent=
  (running?'● capture':'‖ arrêt')+'   '+fps+' FPS\n'+durSec+' s · '+FRAME_HZ+' trames/s · '+maxFrames+' courbes\n'+
  'FFT '+FFT+(aweight?' · pond. A':' · lin')+' · '+FMIN+'–'+(FMAX>=1000?(FMAX/1000).toFixed(0)+'k':FMAX)+' Hz'; }
document.getElementById('durSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  durSec=+b.dataset.sec; [...e.currentTarget.children].forEach(c=>c.classList.toggle('on',c===b));
  maxFrames=Math.round(durSec*FRAME_HZ); spacing=DEPTH/maxFrames; while(frames.length>maxFrames)frames.shift();
  allocBuffers(); rebuild(); updateStatus(); });
document.getElementById('awBtn').addEventListener('click',e=>{ aweight=!aweight; e.target.classList.toggle('on',aweight); ema=null; updateStatus(); });
const startBtn=document.getElementById('startBtn');
startBtn.addEventListener('click',async()=>{ if(running){ running=false; startBtn.textContent='Reprendre'; startBtn.classList.remove('rec'); updateStatus(); return; }
  try{ if(!ctx)await startAudio(); else if(ctx.state==='suspended')await ctx.resume();
    running=true; startBtn.textContent='Pause'; startBtn.classList.add('rec'); updateStatus(); }
  catch(err){ fail("Micro indisponible : "+(err&&err.message||err)); } });

buildXS(); allocBuffers(); applyRot(); resize(); updateStatus(); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
